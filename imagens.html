<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variantes da Logo — ARBOR EDITORA</title>
  <meta name="description" content="Variantes da logo da Arbor Editora: pranchas com as combinações da marca sobre as cores oficiais.">
  <link rel="icon" type="image/png" href="img/favicon-arbor.png">
  <link rel="stylesheet" href="css/estilo.css">
  <style>
    /* Estilos próprios da galeria (as logos são brancas, os cartões usam o roxo da marca) */
    .galeria-topo { padding: 46px 0 10px; }
    .galeria-topo .kicker { color: var(--purple); }
    .galeria-topo p { color: var(--ink-2); max-width: 60ch; margin-top: 8px; }
    .galeria-topo .voltar {
      display: inline-flex; align-items: center; gap: 6px;
      margin-bottom: 22px; font-size: 14px; font-weight: 600;
      color: var(--purple-deep); text-decoration: none;
    }
    .galeria-topo .voltar:hover { color: var(--purple-vivid); }

    /* Pranchas de variantes (JPEGs com fundo próprio, exibidas em largura maior) */
    .pranchas { display: grid; gap: 26px; padding: 26px 0 70px; }
    .prancha {
      margin: 0;
      border: 1px solid var(--borda-lavanda, rgba(130, 10, 209, .15));
      border-radius: 20px;
      background: #fff;
      overflow: hidden;
      box-shadow: 0 14px 34px -18px rgba(130, 10, 209, .25);
    }
    .prancha img { display: block; width: 100%; height: auto; }
    .prancha figcaption { padding: 16px 18px 18px; }
    .prancha figcaption b { display: block; font-size: 15px; }
    .prancha figcaption code {
      display: inline-block; margin: 6px 0 8px;
      font: 500 12px/1 var(--font-mono, monospace);
      color: var(--purple-deep);
      background: rgba(130, 10, 209, .07);
      padding: 4px 8px; border-radius: 6px;
    }
    .prancha figcaption p { font-size: 13.5px; color: var(--ink-2); line-height: 1.5; }
  </style>
</head>

<body>
  <main class="container">
    <header class="galeria-topo">
      <a class="voltar" href="index.html">← Voltar para a página principal</a>
      <span class="kicker">Identidade Visual</span>
      <h2>Variantes da Logo</h2>
      <p>Variantes da logo da Arbor Editora — pranchas com as combinações da marca
        sobre as cores oficiais.</p>
    </header>

    <section class="pranchas" aria-label="Pranchas de variantes da logo">
      <figure class="prancha">
        <img src="img/variante1.jpeg" alt="Prancha da logo principal sobre roxo escuro #820ad1 e verde" loading="lazy">
        <figcaption>
          <b>Logo principal — Roxo escuro</b>
          <code>img/variante1.jpeg</code>
          <p>Símbolo do livro em seis combinações sobre roxo #820ad1 e verde da marca.</p>
        </figcaption>
      </figure>

      <figure class="prancha">
        <img src="img/variante2.jpeg" alt="Prancha da variação da logo sobre roxo claro #8525d8 e verde" loading="lazy">
        <figcaption>
          <b>Variação — Roxo claro</b>
          <code>img/variante2.jpeg</code>
          <p>Símbolo do livro aberto em seis combinações sobre roxo claro #8525d8 e verde.</p>
        </figcaption>
      </figure>

      <figure class="prancha">
        <img src="img/variante3.jpeg" alt="Prancha da variação da logo sobre fundos em degradê" loading="lazy">
        <figcaption>
          <b>Variação — Degradê</b>
          <code>img/variante3.jpeg</code>
          <p>Mesmas combinações aplicadas sobre fundos em degradê roxo/verde.</p>
        </figcaption>
      </figure>

    </section>
  </main>
</body>

</html>
